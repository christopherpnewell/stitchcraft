services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CSRF_SECRET=${CSRF_SECRET:-change-this-in-production}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=30
      - MAX_FILE_SIZE_MB=10
    restart: unless-stopped
    # Resource limits to prevent abuse
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
