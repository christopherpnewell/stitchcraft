<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pink rounded square background -->
  <rect width="32" height="32" rx="6" fill="#d92668"/>
  <!-- Knitting needle 1 (left, lighter) -->
  <line x1="9" y1="27" x2="24" y2="5" stroke="#f9a8d4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="5" r="2.5" fill="#f9a8d4"/>
  <!-- Knitting needle 2 (right, white) -->
  <line x1="23" y1="27" x2="8" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="8" cy="5" r="2.5" fill="white"/>
  <!-- Yarn ball (in front of needles) -->
  <circle cx="16" cy="17" r="8.5" fill="white"/>
  <!-- Yarn lines on ball -->
  <path d="M7.5 14.5 Q16 12 24.5 14.5" stroke="#d92668" stroke-width="1.2" fill="none"/>
  <path d="M7.5 19.5 Q16 22 24.5 19.5" stroke="#d92668" stroke-width="1.2" fill="none"/>
  <path d="M12 8.5 Q16 17 12 25.5" stroke="#d92668" stroke-width="1.2" fill="none"/>
  <path d="M20 8.5 Q16 17 20 25.5" stroke="#d92668" stroke-width="1.2" fill="none"/>
</svg>
